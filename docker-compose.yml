services:
  # Claude AI Proxy Server
  claude-proxy:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: claude-proxy-server
    ports:
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3001
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - g2b-network

  # Frontend Admin Application
  g2b-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_CLAUDE_PROXY_URL=${VITE_CLAUDE_PROXY_URL:-http://localhost:3001}
    container_name: g2b-admin-v2
    ports:
      - "4000:80"
    depends_on:
      claude-proxy:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - g2b-network

networks:
  g2b-network:
    driver: bridge
